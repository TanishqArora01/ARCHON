name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: archon_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:8
        ports:
          - 6379:6379
      qdrant:
        image: qdrant/qdrant:v1.13.6
        ports:
          - 6333:6333

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.13

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: Ruff
        run: uv run ruff check src tests main.py scripts

      - name: MyPy
        run: uv run mypy src main.py scripts

      - name: Alembic migrations
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/archon_test
        run: uv run alembic upgrade head

      - name: Pytest
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/archon_test
          REDIS_URL: redis://localhost:6379/0
          QDRANT_URL: http://localhost:6333
        run: uv run pytest

      - name: Benchmark smoke
        run: uv run python scripts/run_benchmarks.py --target fastapi --output benchmark_results.json
